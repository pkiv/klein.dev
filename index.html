<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paul Klein IV</title>
  <style>
    :root {
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --link: #1a1a1a;
      --rule: #e5e5e5;
    }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: Georgia, 'Times New Roman', Times, serif;
      font-size: 18px;
      line-height: 1.6;
      color: var(--text);
      background: #fdfdfb;
      margin: 0;
      padding: 12vh 24px 24px;
    }
    main {
      max-width: 36rem;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: normal;
      margin: 0 0 0.25rem;
    }
    .bio {
      color: var(--muted);
      margin: 0 0 2.5rem;
    }
    h2 {
      font-size: 0.85rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 2rem 0 0.5rem;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li { margin: 0.15rem 0; }
    a {
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
    }
    a:hover { border-bottom-color: var(--text); }
  </style>
</head>
<body>
  <main>
    <h1>Paul Klein IV</h1>
    <p class="bio">Founder &amp; CEO of <a href="https://browserbase.com">Browserbase</a>.</p>

    <h2>Elsewhere</h2>
    <ul>
      <li><a href="https://x.com/pkiv">X / Twitter</a></li>
      <li><a href="https://github.com/pkiv">GitHub</a></li>
      <li><a href="https://www.linkedin.com/in/paulkleiniv/">LinkedIn</a></li>
      <li><a href="mailto:paul@browserbase.com">Email</a></li>
    </ul>

    <h2>Projects</h2>
    <ul>
      <li><a href="https://browserbase.com">Browserbase</a> — the web browser for AI agents</li>
      <li><a href="https://stagehand.dev">Stagehand</a> — the AI browser automation framework</li>
    </ul>
  </main>
</body>
</html>
